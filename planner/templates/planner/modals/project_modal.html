<div id="projectModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded shadow w-96">
    <h2 class="text-lg font-bold mb-4">Nouveau projet</h2>
    <form method="POST" action="{% url 'planner:create_project' %}">
      {% csrf_token %}
      <input type="text" name="name" placeholder="Nom du projet" class="w-full mb-2 p-2 border rounded" required>
      <textarea name="description" placeholder="Description" class="w-full mb-2 p-2 border rounded"></textarea>
      <input type="date" name="due_date" class="w-full mb-4 p-2 border rounded">
      <div class="flex justify-end gap-2">
        <button type="button" onclick="closeModal('projectModal')" class="px-4 py-2 border rounded">Annuler</button>
        <button type="submit" class="bg-violet text-white px-4 py-2 rounded">Créer</button>
      </div>
    </form>
  </div>
</div>
