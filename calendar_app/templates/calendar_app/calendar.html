<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendar - Evap</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        rose: '#F472B6',
        darkrose: '#EC4899',
        softbg: '#FFF1F7'
      }
    }
  }
}
</script>

<style>
.fc {
  background: white;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

.fc-toolbar-title {
  color: #EC4899;
  font-weight: 600;
}

.fc-button {
  background: #F472B6 !important;
  border: none !important;
  border-radius: 10px !important;
}

.fc-button:hover {
  background: #EC4899 !important;
}

.fc-event {
  border: none !important;
  border-radius: 10px !important;
}

.fc-day-today {
  background: #FFE4F1 !important;
}

.event-card {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.06);
  border-left: 4px solid #F472B6;
  margin-bottom: 8px;
}

#eventMenu {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  display: none;
  flex-direction: column;
  gap: 8px;
  min-width: 220px;
  z-index: 9999;
}

.menu-btn {
  padding: 10px;
  border-radius: 10px;
  background: #fff;
  border: 1px solid #eee;
  cursor: pointer;
  text-align: left;
}

.menu-btn:hover {
  background: #FDF2F8;
}
</style>

</head>

<body class="font-sans bg-rose-100 min-h-screen flex">

<aside class="w-64 bg-rose text-white flex flex-col p-6 min-h-screen">

<a href="/" class="text-2xl font-bold mb-6 font-serif">Evap</a>

<nav class="flex flex-col gap-3 mb-8">
<a href="/notes/" class="px-3 py-2 hover:bg-darkrose rounded">Notes</a>
<a href="/planner/" class="px-3 py-2 hover:bg-darkrose rounded">Planner</a>
<a href="/calendar/" class="px-3 py-2 bg-darkrose rounded">Calendrier</a>
<a href="/timer/" class="px-3 py-2 hover:bg-darkrose rounded">Timer</a>
</nav>

<div>
<h2 class="text-sm uppercase opacity-70 mb-3">Aujourd’hui</h2>
<div id="todayEvents" class="space-y-2"></div>
</div>

</aside>

<main class="flex-1 p-10">
<h1 class="text-3xl text-rose font-serif mb-6">Calendrier</h1>
<div id="calendar"></div>
</main>

<!-- MODAL PROPRE -->
<div id="eventModal"
class="fixed inset-0 hidden items-center justify-center bg-black/50 z-50">

<div class="bg-white p-6 rounded-2xl w-[440px] shadow-xl">

<h2 class="text-xl font-bold mb-4 text-rose">Événement</h2>

<input id="eventTitle" placeholder="Titre"
class="w-full p-2 border rounded mb-4">

<!-- START -->
<div class="flex gap-2 mb-4">
  <select id="startHour" class="w-1/2 p-2 border rounded"></select>
  <select id="startMinute" class="w-1/2 p-2 border rounded">
    <option>00</option>
    <option>15</option>
    <option>30</option>
    <option>45</option>
  </select>
</div>

<!-- END -->
<div class="flex gap-2 mb-4">
  <select id="endHour" class="w-1/2 p-2 border rounded"></select>
  <select id="endMinute" class="w-1/2 p-2 border rounded">
    <option value="">--</option>
    <option>00</option>
    <option>15</option>
    <option>30</option>
    <option>45</option>
  </select>
</div>

<select id="eventType" class="w-full p-2 border rounded mb-3">
  <option value="personal">Personnel</option>
  <option value="course">Cours</option>
  <option value="meeting">Rendez-vous</option>
</select>

<select id="recurrenceType" class="w-full p-2 border rounded mb-3">
  <option value="">Pas de récurrence</option>
  <option value="daily">Quotidien</option>
  <option value="weekly">Hebdomadaire</option>
  <option value="monthly">Mensuel</option>
</select>

<input id="recurrenceEnd" type="date"
class="w-full p-2 border rounded mb-4">

<div class="flex justify-end gap-2">
<button onclick="closeModal()" class="px-3 py-2 border rounded">Annuler</button>
<button onclick="saveEvent()" class="px-3 py-2 bg-rose text-white rounded">Sauver</button>
</div>

</div>
</div>

<!-- MENU -->
<div id="eventMenu">
  <button class="menu-btn" onclick="openEdit()">Modifier</button>
  <button class="menu-btn" onclick="deleteSingle()">Supprimer</button>
  <hr>
  <button class="menu-btn" onclick="editSeries()">Modifier série</button>
  <button class="menu-btn" onclick="deleteSeries()">Supprimer série</button>
  <button class="menu-btn" onclick="closeMenu()">Fermer</button>
</div>

<script>

let selectedDate = null;
let calendar = null;
let selectedEvent = null;
let editingEventId = null;

/* populate hours */
function fillHours() {
  const start = document.getElementById("startHour");
  const end = document.getElementById("endHour");

  for (let i = 0; i < 24; i++) {
    const val = i.toString().padStart(2, '0');
    start.innerHTML += `<option value="${val}">${val}</option>`;
    end.innerHTML += `<option value="${val}">${val}</option>`;
  }
}

document.addEventListener('DOMContentLoaded', function () {

fillHours();

calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
locale: 'fr',
initialView: 'dayGridMonth',
editable: true,
height: "auto",

headerToolbar: {
left: 'prev,next today',
center: 'title',
right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
},

slotDuration: '00:30:00',
snapDuration: '00:30:00',
events: '/calendar/events/',

dateClick(info){
selectedDate = info.dateStr.split("T")[0];
openModal();
},

eventClick(info){
selectedEvent = info.event;
openMenu();
},

eventDrop: updateEvent,
eventResize: updateEvent,
eventDidMount: syncSidebar
});

calendar.render();
});

/* SAVE */
function saveEvent(){

const title = document.getElementById("eventTitle").value;

const start = `${selectedDate}T${document.getElementById("startHour").value}:${document.getElementById("startMinute").value}:00`;

const endMin = document.getElementById("endMinute").value;

const end = endMin
? `${selectedDate}T${document.getElementById("endHour").value}:${endMin}:00`
: null;

const payload = {
title,
start,
end,
type: document.getElementById("eventType").value,
recurrence_type: document.getElementById("recurrenceType").value || null,
recurrence_end: document.getElementById("recurrenceEnd").value || null
};

const url = editingEventId
? `/calendar/update/${editingEventId}/`
: "/calendar/create/";

fetch(url, {
method: "POST",
headers: {
"Content-Type": "application/json",
"X-CSRFToken": "{{ csrf_token }}"
},
body: JSON.stringify(payload)
}).then(() => {
calendar.refetchEvents();
closeModal();
});
}

/* UI */
function openModal(){
document.getElementById("eventModal").classList.remove("hidden");
document.getElementById("eventModal").classList.add("flex");
}

function closeModal(){
document.getElementById("eventModal").classList.add("hidden");
document.getElementById("eventModal").classList.remove("flex");
editingEventId = null;
}

function openMenu(){
document.getElementById("eventMenu").style.display = "flex";
}

function closeMenu(){
document.getElementById("eventMenu").style.display = "none";
}

/* SIDEBAR */
function syncSidebar(){
const box = document.getElementById("todayEvents");
if(!box) return;

const today = new Date().toISOString().split("T")[0];
const events = calendar.getEvents().filter(e => e.startStr.startsWith(today));

box.innerHTML = events.length ? "" : "<p class='opacity-60'>Aucun événement</p>";

events.forEach(ev => {
const div = document.createElement("div");
div.className = "event-card";
div.innerHTML = `
<div class="font-semibold text-rose">${ev.title}</div>
<div class="text-xs text-gray-500">
${new Date(ev.start).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
</div>`;
box.appendChild(div);
});
}

/* UPDATE */
function updateEvent(info){
fetch(`/calendar/update/${info.event.id}/`, {
method: "POST",
headers: {
"Content-Type": "application/json",
"X-CSRFToken":"{{ csrf_token }}"
},
body: JSON.stringify({
start: info.event.start.toISOString(),
end: info.event.end ? info.event.end.toISOString() : null,
mode: "single"
})
}).then(() => calendar.refetchEvents());
}

/* DELETE */
function deleteSingle(){
fetch(`/calendar/delete/${selectedEvent.id}/`, {
method: "POST",
headers: {
"Content-Type": "application/json",
"X-CSRFToken":"{{ csrf_token }}"
},
body: JSON.stringify({mode:"single"})
}).then(() => {
calendar.refetchEvents();
closeMenu();
});
}

/* SERIES */
function deleteSeries(){
fetch(`/calendar/delete/${selectedEvent.id}/`, {
method: "POST",
headers: {
"Content-Type": "application/json",
"X-CSRFToken":"{{ csrf_token }}"
},
body: JSON.stringify({mode:"series"})
}).then(() => {
calendar.refetchEvents();
closeMenu();
});
}

function openEdit(){
const ev = selectedEvent;
editingEventId = ev.id;

document.getElementById("eventTitle").value = ev.title;

const start = new Date(ev.start);
document.getElementById("startHour").value = start.toTimeString().slice(0,2);
document.getElementById("startMinute").value = start.toTimeString().slice(3,5);

openModal();
closeMenu();
}

function editSeries(){

const newTime = prompt("Nouvelle heure (HH:MM)");
if(!newTime) return;

const baseDate = selectedEvent.startStr.split("T")[0];

fetch(`/calendar/update/${selectedEvent.id}/`, {
method: "POST",
headers: {
"Content-Type": "application/json",
"X-CSRFToken":"{{ csrf_token }}"
},
body: JSON.stringify({
start: `${baseDate}T${newTime}:00`,
mode:"series"
})
}).then(() => {
calendar.refetchEvents();
closeMenu();
});
}

</script>

</body>
</html>
